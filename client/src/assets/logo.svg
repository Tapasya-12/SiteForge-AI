<svg width="320" height="64" viewBox="0 0 320 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient for glow and elements -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for purple background effect -->
    <filter id="purpleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.545 0 0 0 0 0.294 0 0 0 0 0.925 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- AI pill gradient stroke -->
    <linearGradient id="pillGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background glow circle -->
  <circle cx="32" cy="32" r="28" fill="url(#mainGradient)" opacity="0.08" filter="url(#purpleGlow)"/>

  <!-- 3D Wireframe Building Block -->
  <g transform="translate(8, 16)">
    <!-- Front face -->
    <rect x="8" y="8" width="16" height="16" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.8"/>
    <!-- Top face -->
    <path d="M8 8 L16 4 L24 4 L32 8 Z" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.6"/>
    <!-- Right face -->
    <path d="M24 8 L32 8 L32 24 L24 24 Z" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.6"/>
    <!-- Grid lines -->
    <line x1="8" y1="12" x2="24" y2="12" stroke="url(#mainGradient)" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="16" x2="24" y2="16" stroke="url(#mainGradient)" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="20" x2="24" y2="20" stroke="url(#mainGradient)" stroke-width="0.8" opacity="0.4"/>
    <line x1="12" y1="8" x2="12" y2="24" stroke="url(#mainGradient)" stroke-width="0.8" opacity="0.4"/>
    <line x1="16" y1="8" x2="16" y2="24" stroke="url(#mainGradient)" stroke-width="0.8" opacity="0.4"/>
    <line x1="20" y1="8" x2="20" y2="24" stroke="url(#mainGradient)" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Magic Spark/Star emanating from the block -->
  <g transform="translate(32, 20)">
    <!-- Spark rays -->
    <line x1="0" y1="0" x2="8" y2="-4" stroke="url(#mainGradient)" stroke-width="2" opacity="0.9" filter="url(#textGlow)"/>
    <line x1="0" y1="0" x2="6" y2="6" stroke="url(#mainGradient)" stroke-width="2" opacity="0.9" filter="url(#textGlow)"/>
    <line x1="0" y1="0" x2="-4" y2="8" stroke="url(#mainGradient)" stroke-width="2" opacity="0.9" filter="url(#textGlow)"/>
    <line x1="0" y1="0" x2="-8" y2="-2" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="4" y2="-8" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.7"/>
    <!-- Spark center -->
    <circle cx="0" cy="0" r="2" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="1" fill="url(#mainGradient)"/>
  </g>

  <!-- SiteForge Text -->
  <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700" letter-spacing="-0.5px"
        fill="url(#mainGradient)" filter="url(#textGlow)">SiteForge</text>

  <!-- AI Pill -->
  <g transform="translate(70, 35)">
    <!-- Pill background -->
    <rect x="0" y="0" width="28" height="14" rx="7" fill="rgba(139, 92, 246, 0.1)"/>
    <!-- Pill border -->
    <rect x="0" y="0" width="28" height="14" rx="7" fill="none" stroke="url(#pillGradient)" stroke-width="1.5"/>
    <!-- AI text -->
    <text x="14" y="10" font-family="system-ui, -apple-system, sans-serif"
          font-size="10" font-weight="600" text-anchor="middle"
          fill="url(#mainGradient)">AI</text>
  </g>
</svg>
