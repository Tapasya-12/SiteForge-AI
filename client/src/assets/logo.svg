<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="gf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Squircle mark -->
  <rect x="0" y="4" width="72" height="72" rx="18" fill="url(#gf)"/>

  <!-- back page -->
  <rect x="18" y="14" width="36" height="26" rx="4" fill="white" opacity="0.22"/>
  <!-- mid page -->
  <rect x="14" y="24" width="36" height="26" rx="4" fill="white" opacity="0.48"/>
  <!-- front page -->
  <rect x="10" y="34" width="36" height="26" rx="4" fill="white"/>
  <!-- lines -->
  <rect x="17" y="42" width="18" height="3" rx="1.5" fill="#7c3aed"/>
  <rect x="17" y="49" width="13" height="3" rx="1.5" fill="#c4b5fd"/>
  <rect x="17" y="56" width="15" height="3" rx="1.5" fill="#c4b5fd"/>

  <!-- SITEFORGE wordmark -->
  <text x="88" y="46" font-family="'Trebuchet MS', Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.5">SITE<tspan fill="#a78bfa">FORGE</tspan></text>

  <!-- AI pill badge -->
  <rect x="90" y="54" width="28" height="16" rx="8" fill="#7c3aed"/>
  <text x="104" y="66" font-family="'Trebuchet MS', Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">AI</text>
</svg>
