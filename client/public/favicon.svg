<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Squircle base -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#gf)"/>

  <!-- Stacked pages centered -->
  <!-- back page -->
  <rect x="16" y="8"  width="32" height="24" rx="4" fill="white" opacity="0.22"/>
  <!-- mid page -->
  <rect x="12" y="18" width="32" height="24" rx="4" fill="white" opacity="0.48"/>
  <!-- front page -->
  <rect x="8"  y="28" width="32" height="24" rx="4" fill="white" opacity="1"/>
  <!-- content lines -->
  <rect x="14" y="36" width="16" height="3" rx="1.5" fill="#7c3aed"/>
  <rect x="14" y="43" width="11" height="3" rx="1.5" fill="#c4b5fd"/>
  <rect x="14" y="50" width="13" height="3" rx="1.5" fill="#c4b5fd"/>
</svg>
